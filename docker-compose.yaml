version: "3"

services:
  web:
    build:
      context: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports: 
      - "7001:8000"
    env_file:
      .env
    depends_on:
      - db
      - redis
    volumes:
       - .:/app

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    volumes:
      - redis-data:/data
  celery_worker:
    build:
      context: .
    command: celery -A blog worker --loglevel=INFO
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app
  
  celery_beat:
    build:
      context: .
    command: celery -A blog beat --loglevel=WARNING
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app
  
  celery_flower:
    build:
      context: .
    command: celery -A blog flower --port=5555
    depends_on:
      - redis
    ports:
      - "5556:5555"
    env_file:
      .env
    volumes:
      - .:/app

volumes:
    db-data:
    redis-data: